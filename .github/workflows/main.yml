name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: jest-app

jobs:
  # ── Step 1: Test + Coverage Gate ──────────────────────────────
  test:
    name: Test & Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'jest-app/package-lock.json'

      - name: Install Dependencies
        run: npm ci && npm install --save-dev ts-node

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --forceExit

      - name: Check coverage is ≥ 80%
        run: |
          if [ ! -f coverage/lcov.info ]; then echo "Coverage report not found!"; exit 1; fi
          FOUND=$(grep -h "^LF:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          HIT=$(grep -h "^LH:" coverage/lcov.info | awk -F: '{s+=$2} END{print s}')
          if [ "$FOUND" -eq 0 ]; then echo "No lines found to cover"; exit 1; fi
          PCT=$(( HIT * 100 / FOUND ))
          echo "Coverage: $PCT%"
          [ "$PCT" -ge 80 ] || { echo "Coverage $PCT% < 80%. Failing."; exit 1; }

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: jest-app/coverage/

  # ── Step 2: SonarQube Analysis ────────────────────────────────
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: jest-app/coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://reimagined-xylophone-q79wgx5gpx6634gjw-9000.app.github.dev"
        with:
          projectBaseDir: jest-app
          args: >
            -Dsonar.projectKey=jest-sonarqube
            -Dsonar.sources=.
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://reimagined-xylophone-q79wgx5gpx6634gjw-9000.app.github.dev"
        with:
          scanMetadataReportFile: jest-app/.scannerwork/report-task.txt

  # ── Step 3: Deploy ────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: sonar
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'jest-app/package-lock.json'

      - run: npm ci
      - run: npm run build
      - run: echo "Deploying application..."
