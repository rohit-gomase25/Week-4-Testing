name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: jest-app

jobs:
  test:
    name: Test & Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'jest-app/package-lock.json'
      - name: Install Dependencies
        run: npm ci && npm install --save-dev ts-node
      - name: Run tests with coverage
        run: npm run test:coverage -- --ci --forceExit
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: jest-app/coverage/

  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: jest-app/coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Using the URL shown in your codespace environment
          SONAR_HOST_URL: "https://refactored-cod-pjgxq65qpqxvfq9-9000.app.github.dev"
        with:
          projectBaseDir: jest-app
          args: >
            -Dsonar.projectKey=jestt-sonarqube
            -Dsonar.sources=.
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://refactored-cod-pjgxq65qpqxvfq9-9000.app.github.dev"
        with:
          # Path corrected for your project structure
          scanMetadataReportFile: jest-app/.scannerwork/report-task.txt

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: sonar
    if: github.event_name == 'push'
    steps:
      - run: echo "Deploying application..."
